<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#0a1128"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" style="stop-color:#00d68f;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0d1b3e;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="gGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6e0"/>
      <stop offset="45%" style="stop-color:#00d68f"/>
      <stop offset="100%" style="stop-color:#a8f000"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d68f"/>
      <stop offset="100%" style="stop-color:#c8ff00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00d68f" flood-opacity="0.5"/>
    </filter>
    <filter id="arrowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Inner glow overlay -->
  <rect width="192" height="192" rx="42" fill="url(#glow)"/>

  <!-- Sparkle stars -->
  <circle cx="38" cy="52" r="2.5" fill="#00c6e0" opacity="0.7"/>
  <circle cx="148" cy="68" r="2" fill="#a8f000" opacity="0.6"/>
  <circle cx="155" cy="140" r="1.5" fill="#00d68f" opacity="0.5"/>
  <circle cx="30" cy="138" r="2" fill="#00c6e0" opacity="0.4"/>

  <!-- G letter with gradient + glow -->
  <text x="96" y="135" text-anchor="middle" 
        font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="115" 
        fill="url(#gGrad)" filter="url(#shadow)">G</text>

  <!-- Upward arrow -->
  <g filter="url(#arrowGlow)">
    <!-- Arrow line -->
    <line x1="105" y1="92" x2="140" y2="38" stroke="url(#arrowGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="140,38 120,38 140,58" fill="url(#arrowGrad)"/>
  </g>
</svg>
