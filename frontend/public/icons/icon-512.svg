<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#0a1128"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" style="stop-color:#00d68f;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0d1b3e;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="gGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6e0"/>
      <stop offset="45%" style="stop-color:#00d68f"/>
      <stop offset="100%" style="stop-color:#a8f000"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d68f"/>
      <stop offset="100%" style="stop-color:#c8ff00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#00d68f" flood-opacity="0.55"/>
    </filter>
    <filter id="arrowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Inner glow overlay -->
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- Sparkle dots -->
  <circle cx="100" cy="130" r="7" fill="#00c6e0" opacity="0.7"/>
  <circle cx="395" cy="170" r="5" fill="#a8f000" opacity="0.6"/>
  <circle cx="415" cy="370" r="4" fill="#00d68f" opacity="0.5"/>
  <circle cx="80" cy="370" r="6" fill="#00c6e0" opacity="0.4"/>
  <circle cx="230" cy="80" r="3.5" fill="#a8f000" opacity="0.5"/>

  <!-- G letter -->
  <text x="256" y="360" text-anchor="middle"
        font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="310"
        fill="url(#gGrad)" filter="url(#shadow)">G</text>

  <!-- Upward arrow -->
  <g filter="url(#arrowGlow)">
    <line x1="278" y1="242" x2="376" y2="100" stroke="url(#arrowGrad)" stroke-width="22" stroke-linecap="round"/>
    <polygon points="376,100 318,100 376,160" fill="url(#arrowGrad)"/>
  </g>
</svg>
